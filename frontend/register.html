<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshCart | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-wrap">
        <section class="auth-shell">
            <div class="auth-panel">
                <p class="eyebrow">FreshCart</p>
                <h1>Create account</h1>
                <p>Start ordering groceries in minutes with verified sourcing.</p>

                <label>Name</label>
                <input id="name" placeholder="Your name">

                <label>Email</label>
                <input id="email" placeholder="you@example.com">

                <label>Password</label>
                <input id="password" type="password" placeholder="Create password">

                <label class="auth-check">
                    <input type="checkbox">
                    <span>I agree to the terms and privacy policy</span>
                </label>

                <button class="primary-btn" onclick="register()">Register</button>

                <p class="auth-foot">Already have an account? <a href="login.html">Login</a></p>
                <p class="auth-foot"><a href="index.html">Back to store</a></p>
            </div>
            <aside class="auth-visual">
                <img src="assets/auth-register.jpg" alt="Fresh produce baskets" loading="lazy">
                <div class="auth-visual-overlay">
                    <strong>Fresh picks</strong>
                    <span>Seasonal produce delivered daily</span>
                </div>
            </aside>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-top">
            <strong>FreshCart</strong>
            <div class="footer-links">
                <a href="index.html">Shop</a>
                <a href="login.html">Login</a>
            </div>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>

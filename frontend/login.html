<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshCart | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-wrap">
        <section class="auth-shell">
            <div class="auth-panel">
                <p class="eyebrow">FreshCart</p>
                <h1>Welcome back</h1>
                <p>Login to continue shopping with trusted, fresh delivery slots.</p>

                <label>Email</label>
                <input id="email" placeholder="you@example.com">

                <label>Password</label>
                <input id="password" type="password" placeholder="Enter password">

                <div class="auth-row">
                    <label class="auth-check">
                        <input type="checkbox">
                        <span>Keep me signed in</span>
                    </label>
                    <a class="auth-link" href="#">Forgot password?</a>
                </div>

                <button class="primary-btn" onclick="login()">Login</button>

                <p class="auth-foot">New here? <a href="register.html">Create account</a></p>
                <p class="auth-foot"><a href="index.html">Back to store</a></p>
            </div>
            <aside class="auth-visual">
                <img src="assets/auth-login.jpg" alt="Groceries packed for delivery" loading="lazy">
                <div class="auth-visual-overlay">
                    <strong>Fast delivery</strong>
                    <span>Track every order in real time</span>
                </div>
            </aside>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-top">
            <strong>FreshCart</strong>
            <div class="footer-links">
                <a href="index.html">Shop</a>
                <a href="register.html">Sign up</a>
            </div>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
